name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * *'   # daily run at 9AM UTC

jobs:
  test:
    name: Playwright - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false      # don't cancel other OS runs if one fails
      matrix:
        os: [ubuntu-latest] # add macos-latest / windows-latest if needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true   # ← triggers isCI=true in config (2 workers + retries + github reporter)

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()           # upload even on failure
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14